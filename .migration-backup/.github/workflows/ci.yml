name: ci

on:
  push:

jobs:
  backend:
    runs-on: ubuntu-latest
    env:
      PYTHONPATH: backend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            **/requirements*.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install ruff
          find . -name 'requirements*.txt' -type f | sort | while read -r requirements_file; do
            python -m pip install -r "$requirements_file"
          done

      - name: Run lint
        run: |
          python -m ruff check backend/app backend/tests tests

      - name: Run tests
        run: |
          python -m pytest backend/tests tests

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run lint
        run: npm run lint

      - name: Run build
        run: npm run build
