<!doctype html>
<html lang="en"><head><meta charset="utf-8"/><title>Cards</title>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>body{background:var(--parchment);padding:18px}.row{display:grid;grid-template-columns:1fr 1fr;gap:14px}</style>
</head><body>
  <div class="row">
    <article class="tessera" style="padding:18px 20px">
      <div style="display:flex;gap:12px;align-items:center">
        <div class="ca-avatar" style="width:42px;height:42px;font-size:14px;background:var(--aegean-wash);color:var(--aegean-deep);border-color:var(--aegean-soft)"><span>PT</span></div>
        <div>
          <div class="ca-display" style="font-size:18px">Patrick Torres</div>
          <div class="ca-eyebrow" style="margin-top:4px">Build phase · Wk 8</div>
        </div>
        <span class="ca-chip ca-chip-terra" style="margin-left:auto">1 pending</span>
      </div>
      <div style="border-left:2px solid var(--ochre);padding-left:10px;margin-top:14px;font-family:var(--serif);font-style:italic;font-size:13.5px;color:var(--ink-soft);line-height:1.5">"Legs felt heavy on the long run today, but held target pace."</div>
    </article>
    <article class="ca-panel" style="padding:18px 20px">
      <div class="ca-eyebrow ca-eyebrow-aegean">Suggested reply</div>
      <p style="font:var(--t-body);margin-top:8px;color:var(--ink)">Heavy legs after a long run at target pace is a great sign — your body is adapting. Keep Tuesday easy and trust the process.</p>
    </article>
  </div>
</body></html>
