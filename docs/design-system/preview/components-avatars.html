<!doctype html>
<html lang="en"><head><meta charset="utf-8"/><title>Avatars</title>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>body{background:var(--parchment);padding:18px}.row{display:flex;gap:10px;align-items:flex-end}.cap{font-family:var(--mono);font-size:9px;letter-spacing:.14em;text-transform:uppercase;color:var(--ink-mute);margin-top:4px;text-align:center}.col{display:flex;flex-direction:column;align-items:center}</style>
</head><body>
  <div class="row">
    <div class="col"><div class="ca-avatar" style="width:32px;height:32px;font-size:12px"><span>FD</span></div><div class="cap">32 · linen</div></div>
    <div class="col"><div class="ca-avatar" style="width:40px;height:40px;font-size:14px;background:var(--aegean-wash);border-color:var(--aegean-soft);color:var(--aegean-deep)"><span>PT</span></div><div class="cap">40 · aegean</div></div>
    <div class="col"><div class="ca-avatar" style="width:52px;height:52px;font-size:18px;background:var(--terracotta-soft);border-color:oklch(0.80 0.08 45);color:var(--terracotta-deep)"><span>SL</span></div><div class="cap">52 · terra</div></div>
    <div class="col"><div class="ca-avatar" style="width:64px;height:64px;font-size:24px;background:var(--ochre-soft);border-color:oklch(0.80 0.08 80);color:oklch(0.40 0.08 75)"><span>MV</span></div><div class="cap">64 · ochre</div></div>
  </div>
</body></html>
