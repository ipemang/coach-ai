<!doctype html>
<html lang="en"><head><meta charset="utf-8"/><title>Elevation</title>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>body{background:var(--parchment);padding:24px}.row{display:grid;grid-template-columns:1fr 1fr;gap:16px}.cap{font-family:var(--mono);font-size:9.5px;letter-spacing:.14em;text-transform:uppercase;color:var(--ink-mute);margin-top:8px}</style>
</head><body>
  <div class="row">
    <div>
      <div class="tessera" style="height:90px;display:flex;align-items:center;justify-content:center;font-family:var(--serif);font-size:18px;color:var(--ink)">tessera card</div>
      <div class="cap">--shadow-card · 1px inset white + 8px Y4 ink wash</div>
    </div>
    <div>
      <div class="ca-panel" style="height:90px;display:flex;align-items:center;justify-content:center;font-family:var(--serif);font-size:18px;color:var(--ink)">ca-panel</div>
      <div class="cap">--shadow-panel · larger plate · used on auth form</div>
    </div>
  </div>
  <div class="ca-display-italic" style="font-size:13px;color:var(--ink-soft);margin-top:14px">Two recipes only. No glow. No drop shadow on inputs.</div>
</body></html>
