<!doctype html>
<html lang="en"><head><meta charset="utf-8"/><title>Mosaic & tessera pattern</title>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>body{padding:18px;background:var(--parchment)}.row{display:grid;grid-template-columns:1fr 1fr;gap:14px}.swatch{height:130px;border-radius:4px;border:1px solid var(--rule);overflow:hidden;position:relative}.cap{font-family:var(--mono);font-size:9.5px;letter-spacing:.14em;text-transform:uppercase;color:var(--ink-mute);margin-top:6px}</style>
</head><body>
  <div class="row">
    <div>
      <div class="swatch mosaic-bg"></div>
      <div class="cap">.mosaic-bg · auth & marketing hero</div>
    </div>
    <div>
      <div class="swatch tessera"></div>
      <div class="cap">.tessera · 60px square overlay (0.18 op)</div>
    </div>
  </div>
</body></html>
