<!doctype html>
<html lang="en"><head><meta charset="utf-8"/><title>Week tiles</title>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>body{background:var(--parchment);padding:18px}.lbl{font:var(--t-eyebrow);text-transform:uppercase;color:var(--ink-mute);font-size:10px;margin-bottom:6px;letter-spacing:.16em}.week{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;max-width:500px}</style>
</head><body>
  <div class="lbl">This week — Patrick Torres</div>
  <div class="week">
    <div class="ca-week-tile done"><div style="text-align:center"><div style="font-size:9px;opacity:.7">M</div><div style="font-size:13px;font-family:var(--serif);margin-top:1px">8</div></div></div>
    <div class="ca-week-tile done"><div style="text-align:center"><div style="font-size:9px;opacity:.7">T</div><div style="font-size:13px;font-family:var(--serif);margin-top:1px">12</div></div></div>
    <div class="ca-week-tile missed"><div style="text-align:center"><div style="font-size:9px;opacity:.7">W</div><div style="font-size:13px;font-family:var(--serif);margin-top:1px">—</div></div></div>
    <div class="ca-week-tile done"><div style="text-align:center"><div style="font-size:9px;opacity:.7">T</div><div style="font-size:13px;font-family:var(--serif);margin-top:1px">10</div></div></div>
    <div class="ca-week-tile planned today"><div style="text-align:center"><div style="font-size:9px;opacity:.7">F</div><div style="font-size:13px;font-family:var(--serif);margin-top:1px">15</div></div></div>
    <div class="ca-week-tile planned"><div style="text-align:center"><div style="font-size:9px;opacity:.7">S</div><div style="font-size:13px;font-family:var(--serif);margin-top:1px">22</div></div></div>
    <div class="ca-week-tile planned"><div style="text-align:center"><div style="font-size:9px;opacity:.7">S</div><div style="font-size:13px;font-family:var(--serif);margin-top:1px">6</div></div></div>
  </div>
  <div class="ca-display-italic" style="font-size:13px;color:var(--ink-soft);margin-top:12px">aegean done · terracotta missed · ochre today · olive planned</div>
</body></html>
