<!doctype html>
<html lang="en"><head><meta charset="utf-8"/><title>Form</title>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>body{background:var(--linen);padding:20px}.row{display:grid;grid-template-columns:1fr 1fr;gap:14px}</style>
</head><body>
  <div class="row">
    <div>
      <label class="ca-label">Email</label>
      <input class="ca-input" placeholder="coach@example.com"/>
    </div>
    <div>
      <label class="ca-label">Password</label>
      <input class="ca-input" type="password" value="••••••••"/>
    </div>
  </div>
  <div style="margin-top:14px;display:flex;gap:10px">
    <button class="ca-btn ca-btn-primary" style="padding:11px 18px;justify-content:center;flex:1">Sign in →</button>
    <button class="ca-btn">Cancel</button>
  </div>
</body></html>
