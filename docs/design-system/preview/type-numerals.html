<!doctype html>
<html lang="en"><head><meta charset="utf-8"/><title>Numerals</title>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>body{background:var(--parchment);padding:18px}.row{display:grid;grid-template-columns:repeat(4,1fr);gap:1px;background:var(--rule);border:1px solid var(--rule);border-radius:4px;overflow:hidden}.cell{background:var(--linen);padding:18px 16px}.eb{font:var(--t-eyebrow);text-transform:uppercase;color:var(--ink-mute);font-size:9.5px;letter-spacing:.16em}.n{font-family:var(--serif);font-feature-settings:"lnum","tnum";font-weight:500;line-height:1;margin-top:8px}</style>
</head><body>
  <div class="row">
    <div class="cell"><div class="eb">Athletes</div><div class="n" style="font-size:44px;color:var(--ink)">12</div></div>
    <div class="cell"><div class="eb">Pending</div><div class="n" style="font-size:44px;color:var(--terracotta-deep)">3</div></div>
    <div class="cell"><div class="eb">Readiness</div><div class="n" style="font-size:36px;color:var(--aegean-deep)">82<span style="font-size:14px;color:var(--ink-mute)">/100</span></div></div>
    <div class="cell"><div class="eb">Plan</div><div class="n" style="font-size:36px">$99<span style="font-size:13px;color:var(--ink-mute)">/mo</span></div></div>
  </div>
  <div class="ca-display-italic" style="font-size:13px;color:var(--ink-mute);margin-top:10px">Numerals are set in Cormorant — masthead, not dashboard.</div>
</body></html>
