<!doctype html>
<html lang="en"><head><meta charset="utf-8"/><title>Buttons</title>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>body{background:var(--parchment);padding:20px}.row{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:14px}.lbl{font:var(--t-eyebrow);text-transform:uppercase;color:var(--ink-mute);font-size:10px;margin-bottom:6px;letter-spacing:.16em}</style>
</head><body>
  <div class="lbl">Variants</div>
  <div class="row">
    <button class="ca-btn ca-btn-primary">Sign in →</button>
    <button class="ca-btn">Athlete login</button>
    <button class="ca-btn ca-btn-terra">Resend plan link</button>
    <button class="ca-btn ca-btn-ghost">Cancel</button>
    <button class="ca-btn" disabled>Disabled</button>
  </div>
  <div class="lbl">Sizing — 9px 16px padding · 2px radius · 13px Work Sans 500</div>
  <div class="row">
    <button class="ca-btn ca-btn-primary" style="padding:11px 22px;font-size:14px">Get started →</button>
    <button class="ca-btn ca-btn-primary">Approve</button>
    <button class="ca-btn ca-btn-primary" style="padding:6px 12px;font-size:12px">Save</button>
  </div>
</body></html>
