<!doctype html>
<html lang="en"><head><meta charset="utf-8"/><title>Iconography</title>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>body{background:var(--parchment);padding:18px;color:var(--ink)}.row{display:grid;grid-template-columns:repeat(8,1fr);gap:10px;text-align:center}.cell{padding:10px 6px;border:1px solid var(--rule-soft);border-radius:2px;background:var(--linen)}.nm{font-family:var(--mono);font-size:9px;letter-spacing:.1em;text-transform:uppercase;color:var(--ink-mute);margin-top:6px}svg{display:block;margin:0 auto}</style>
</head><body>
  <div class="row">
    <div class="cell"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="10" cy="10" r="6"/><path d="M15 15 L20 20"/></svg><div class="nm">Search</div></div>
    <div class="cell"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M12 5 L12 19 M5 12 L19 12"/></svg><div class="nm">Plus</div></div>
    <div class="cell"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 12 L10 17 L19 7"/></svg><div class="nm">Check</div></div>
    <div class="cell"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg><div class="nm">Edit</div></div>
    <div class="cell"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M6 6 L18 18 M18 6 L6 18"/></svg><div class="nm">X</div></div>
    <div class="cell"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M5 12 L19 12 M14 7 L19 12 L14 17"/></svg><div class="nm">Arrow</div></div>
    <div class="cell"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2"><circle cx="12" cy="12" r="4"/><path d="M12 2v3M12 19v3M2 12h3M19 12h3M4.9 4.9l2.1 2.1M17 17l2.1 2.1M4.9 19.1L7 17M17 7l2.1-2.1"/></svg><div class="nm">Sun</div></div>
    <div class="cell"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2"><path d="M2 20l6-10 4 5 4-9 6 14z"/></svg><div class="nm">Mtn</div></div>
    <div class="cell"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2"><path d="M12 20C4 14 3 9 6 6c3-3 6 0 6 2c0-2 3-5 6-2c3 3 2 8-6 14z"/></svg><div class="nm">Heart</div></div>
    <div class="cell"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2"><path d="M20 14c-1 4-5 7-9 7-5 0-8-4-8-9 0-4 3-8 7-9-2 3-1 8 2 10 3 2 6 1 8 1z"/></svg><div class="nm">Moon</div></div>
    <div class="cell"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2"><path d="M12 3c-4 4-6 7-6 11 0 4 3 7 6 7s6-3 6-7c0-4-3-5-4-8-.5 2-1.5 3-2 3z"/></svg><div class="nm">Flame</div></div>
    <div class="cell"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2"><path d="M5 4c0 0 0 4 3 4h11v10c0 2-2 2-2 2H6c-2 0-2-2-2-4V4z"/><path d="M8 8v10M11 12h5M11 15h5"/></svg><div class="nm">Scroll</div></div>
    <div class="cell"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2"><path d="M6 4h12v2H6zM7 6v12M17 6v12M10 6v12M14 6v12M5 18h14v2H5z"/></svg><div class="nm">Column</div></div>
    <div class="cell" style="opacity:.5"><span style="font-size:18px">⏱</span><div class="nm">Timer*</div></div>
    <div class="cell" style="opacity:.5"><span style="font-size:18px;font-family:var(--serif)">◆</span><div class="nm">Ornament</div></div>
    <div class="cell" style="opacity:.5"><span style="font-size:18px">→</span><div class="nm">Arrow uni</div></div>
  </div>
  <div class="ca-display-italic" style="font-size:13px;color:var(--ink-soft);margin-top:10px">All hand-rolled SVG · 1.2–2px stroke · currentColor · 24×24 viewBox</div>
</body></html>
