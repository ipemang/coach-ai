<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Andes.IA · Athlete Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,300;9..144,400;9..144,500&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
<div id="root"></div>

<script type="text/babel" src="data.jsx"></script>
<script type="text/babel" src="components.jsx"></script>
<script type="text/babel" src="page-today.jsx"></script>
<script type="text/babel" src="page-season.jsx"></script>
<script type="text/babel" src="page-profile.jsx"></script>
<script type="text/babel" src="page-settings.jsx"></script>
<script type="text/babel" src="tweaks-panel.jsx"></script>

<script type="text/babel">
const { useState, useEffect, useMemo } = React;

const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "weekStart": "Mon",
  "density": "comfy",
  "showBiometrics": true
}/*EDITMODE-END*/;

function App() {
  const [page, setPage] = useState('today');
  const [profileTab, setProfileTab] = useState('report');
  const [settingsSection, setSettingsSection] = useState('Profile');
  const [tweaks, setTweak] = useTweaks(TWEAK_DEFAULTS);
  const [openWorkout, setOpenWorkout] = useState(null);
  const [refreshing, setRefreshing] = useState(false);
  const [appState, updateState, logMemory] = useAppState();
  const [weekOffset, setWeekOffset] = useState(0); // weeks from "today" anchor
  const [celebration, setCelebration] = useState(null); // {title, body}

  // Sync density attribute
  useEffect(() => {
    document.body.setAttribute('data-density', tweaks.density || 'comfy');
  }, [tweaks.density]);

  // Build effective workouts — merge persisted overrides on top of static seed
  const allWorkouts = useMemo(() => {
    const seed = [...LAST_WEEK, ...CURRENT_WEEK];
    return mergeWorkouts(seed, appState.workouts);
  }, [appState.workouts]);

  // Anchor "today" = Apr 27, 2026; offset moves the visible week
  const weekStartDate = useMemo(() => {
    const anchor = parseLocalDate('2026-04-27');
    anchor.setDate(anchor.getDate() + weekOffset * 7);
    return anchor;
  }, [weekOffset]);

  const weekStartKey = useMemo(() => {
    const y = weekStartDate.getFullYear(), m = String(weekStartDate.getMonth() + 1).padStart(2, '0'), d = String(weekStartDate.getDate()).padStart(2, '0');
    return `${y}-${m}-${d}`;
  }, [weekStartDate]);

  const visibleWeek = useMemo(() => {
    const days = Array.from({ length: 7 }, (_, i) => {
      const dt = new Date(weekStartDate);
      dt.setDate(weekStartDate.getDate() + i);
      const y = dt.getFullYear(), m = String(dt.getMonth() + 1).padStart(2, '0'), da = String(dt.getDate()).padStart(2, '0');
      return `${y}-${m}-${da}`;
    });
    return allWorkouts.filter(w => days.includes(w.date));
  }, [allWorkouts, weekStartDate]);

  function handleRefresh() {
    setRefreshing(true);
    setTimeout(() => setRefreshing(false), 700);
    logMemory('sync', 'Manual refresh — pulled coach updates.');
  }

  function handleMove(workoutId, newDate) {
    updateState(prev => ({
      ...prev,
      workouts: { ...prev.workouts, [workoutId]: { ...(prev.workouts[workoutId] || {}), date: newDate } },
      pendingCount: prev.pendingCount + 1,
    }));
    const w = allWorkouts.find(x => x.id === workoutId);
    logMemory('reschedule', `Moved "${w?.title || 'workout'}" to ${newDate}. Awaiting coach review.`, { workoutId, from: w?.date, to: newDate });
  }

  function handleAddComment(workoutId, text) {
    const c = { id: 'c' + Date.now(), author: 'felipe', text, at: 'just now', pending: true };
    updateState(prev => {
      const existing = prev.workouts[workoutId] || {};
      const seedW = allWorkouts.find(w => w.id === workoutId);
      const baseComments = existing.comments ?? seedW?.comments ?? [];
      return {
        ...prev,
        workouts: { ...prev.workouts, [workoutId]: { ...existing, comments: [...baseComments, c] } },
        pendingCount: prev.pendingCount + 1,
      };
    });
    const w = allWorkouts.find(x => x.id === workoutId);
    logMemory('comment', `Comment on "${w?.title}": "${text}"`, { workoutId });
  }

  function handleAddVoiceMemo(workoutId, length) {
    const m = { id: 'v' + Date.now(), length, transcript: '(transcribing…)', sent: true };
    updateState(prev => {
      const existing = prev.workouts[workoutId] || {};
      const seedW = allWorkouts.find(w => w.id === workoutId);
      const base = existing.voiceMemos ?? seedW?.voiceMemos ?? [];
      return {
        ...prev,
        workouts: { ...prev.workouts, [workoutId]: { ...existing, voiceMemos: [...base, m] } },
      };
    });
    const w = allWorkouts.find(x => x.id === workoutId);
    logMemory('voice-memo', `Sent ${length}s voice memo on "${w?.title}".`, { workoutId, length });
  }

  function handleMarkComplete(workout) {
    // Simulate a Strava/Garmin pull — fabricate plausible "actual" from planned
    const planned = workout.planned || {};
    const fakeActual = {
      duration: planned.duration ? jitterDuration(planned.duration) : '0:50:00',
      distance: planned.distance || undefined,
      tss: planned.tss ? Math.round(planned.tss * (0.92 + Math.random() * 0.14)) : undefined,
      hr: 138 + Math.round(Math.random() * 18),
      power: workout.sport === 'bike' ? 210 + Math.round(Math.random() * 25) : undefined,
      source: 'Strava',
    };
    updateState(prev => ({
      ...prev,
      workouts: {
        ...prev.workouts,
        [workout.id]: {
          ...(prev.workouts[workout.id] || {}),
          status: 'met',
          compliance: 0.94 + Math.random() * 0.06,
          actual: fakeActual,
        },
      },
    }));
    logMemory('complete', `Completed "${workout.title}" — synced from Strava.`, { workoutId: workout.id, actual: fakeActual });
    setCelebration({
      title: `Nice work, ${ATHLETE.firstName}.`,
      body: `${workout.title} synced from Strava. Coach Andes will review.`,
    });
  }

  function jitterDuration(plan) {
    const [h, m, s] = plan.split(':').map(Number);
    let total = h * 3600 + m * 60 + (s || 0);
    total = Math.round(total * (0.95 + Math.random() * 0.1));
    const hh = Math.floor(total / 3600), mm = Math.floor((total % 3600) / 60), ss = total % 60;
    return `${hh}:${String(mm).padStart(2, '0')}:${String(ss).padStart(2, '0')}`;
  }

  function handleNav(target) {
    if (typeof target === 'string' && target.includes(':')) {
      const [p, sec] = target.split(':');
      setPage(p);
      if (p === 'settings') setSettingsSection(sec);
    } else {
      setPage(target);
    }
  }

  function handleLogout() {
    setCelebration({ title: 'Signed out.', body: 'Demo only — your data stays right here.' });
  }

  // Find today's workout in current view
  const today = visibleWeek.find(w => w.date === '2026-04-27');

  // Header copy for week nav
  const weekEnd = new Date(weekStartDate);
  weekEnd.setDate(weekStartDate.getDate() + 6);
  const weekLabel = `${weekStartDate.toLocaleDateString('en-US', { month: 'short', day: 'numeric' })} — ${weekEnd.toLocaleDateString('en-US', { month: 'short', day: 'numeric' })}`;

  return (
    <div className="mosaic-bg" style={{ minHeight: '100vh' }} data-density={tweaks.density}>
      <TopNav active={page} onNav={handleNav} onRefresh={handleRefresh} refreshing={refreshing} pendingCount={appState.pendingCount} onLogout={handleLogout} />

      <main style={{ maxWidth: 1440, margin: '0 auto', padding: '32px' }}>
        {page === 'today' && (
          <>
            {/* Hero header */}
            <div style={{ display: 'flex', alignItems: 'flex-end', justifyContent: 'space-between', marginBottom: 28, gap: 24 }}>
              <div>
                <span className="eyebrow">{fmtDate('2026-04-27', { weekday: 'long', month: 'long', day: 'numeric' })}</span>
                <h1 className="display" style={{ fontSize: 44, margin: '4px 0 0', letterSpacing: '-0.025em', lineHeight: 1.05 }}>
                  Good morning, {ATHLETE.firstName}.
                </h1>
                <p style={{ margin: '8px 0 0', fontSize: 14.5, color: 'var(--ink-soft)' }}>
                  Peak block · week 1 of 3 · <span className="mono" style={{ color: 'var(--ink-mute)' }}>13 weeks to Lake Placid</span>
                </p>
              </div>
            </div>

            {/* Two-column hero: Today + Biometrics */}
            <div style={{
              display: 'grid',
              gridTemplateColumns: tweaks.showBiometrics ? '1fr 320px' : '1fr',
              gap: 20,
              marginBottom: 24,
            }}>
              <TodaySnapshot today={today} onOpen={setOpenWorkout} onMarkComplete={handleMarkComplete} />
              {tweaks.showBiometrics && <BiometricsRail visible={true} lastSync={appState.lastSync.whoop} onSync={(label) => {
                updateState(prev => ({ ...prev, lastSync: { ...prev.lastSync, whoop: Date.now() } }));
                logMemory('sync', `Pulled fresh data from ${label}.`);
              }} />}
            </div>

            {/* Week summary */}
            <div style={{ marginBottom: 24 }}>
              <WeekSummary week={visibleWeek} />
            </div>

            {/* Week mosaic */}
            <WeekMosaic
              week={visibleWeek}
              weekStart={weekStartKey}
              weekLabel={weekLabel}
              weekOffset={weekOffset}
              onPrev={() => setWeekOffset(o => o - 1)}
              onNext={() => setWeekOffset(o => o + 1)}
              onThisWeek={() => setWeekOffset(0)}
              onOpen={setOpenWorkout}
              onMove={handleMove} />
          </>
        )}

        {page === 'season' && (
          <>
            <div style={{ marginBottom: 24 }}>
              <span className="eyebrow">Plan</span>
              <h1 className="display" style={{ fontSize: 44, margin: '4px 0 0', letterSpacing: '-0.025em' }}>The full season</h1>
              <p style={{ margin: '8px 0 0', fontSize: 14.5, color: 'var(--ink-soft)' }}>
                Every workout, every block. Drag a session to reschedule — Coach Andes reviews changes before they lock in.
              </p>
            </div>
            <Season
              onOpenWorkout={setOpenWorkout}
              density={tweaks.density}
              blockOverrides={appState.blocks}
              onMoveBlock={(id, newOrder) => {
                updateState(prev => ({
                  ...prev,
                  blocks: { ...prev.blocks, [id]: { ...(prev.blocks[id] || {}), order: newOrder } },
                  pendingCount: prev.pendingCount + 1,
                }));
                logMemory('reorder-block', `Reordered season block "${id}".`, { id, newOrder });
              }} />
          </>
        )}

        {page === 'profile' && (
          <>
            <div style={{ marginBottom: 24 }}>
              <span className="eyebrow">Your training</span>
              <h1 className="display" style={{ fontSize: 44, margin: '4px 0 0', letterSpacing: '-0.025em' }}>Profile & report</h1>
            </div>
            <Profile tab={profileTab} onTab={setProfileTab} memory={appState.memory} />
          </>
        )}

        {page === 'settings' && (
          <>
            <div style={{ marginBottom: 24 }}>
              <span className="eyebrow">Configure</span>
              <h1 className="display" style={{ fontSize: 44, margin: '4px 0 0', letterSpacing: '-0.025em' }}>Settings</h1>
            </div>
            <Settings tweaks={tweaks} setTweak={setTweak} section={settingsSection} onSection={setSettingsSection} onLogout={handleLogout} />
          </>
        )}
      </main>

      {openWorkout && (
        <WorkoutDetail
          workout={allWorkouts.find(w => w.id === openWorkout.id) || openWorkout}
          onClose={() => setOpenWorkout(null)}
          onAddComment={(text) => handleAddComment(openWorkout.id, text)}
          onAddVoiceMemo={(length) => handleAddVoiceMemo(openWorkout.id, length)}
          onMarkComplete={() => { handleMarkComplete(openWorkout); setOpenWorkout(null); }} />
      )}

      <Confetti show={!!celebration} onDone={() => setCelebration(null)} />
      {celebration && <Toast show={true} title={celebration.title} body={celebration.body} onDone={() => setCelebration(null)} />}

      {/* Tweaks panel */}
      <TweaksPanel title="Tweaks">
        <TweakSection title="Layout">
          <TweakRadio label="Density" value={tweaks.density} options={[{value:'comfy',label:'Comfy'},{value:'compact',label:'Compact'}]} onChange={v => setTweak('density', v)} />
          <TweakToggle label="Show readiness rail" value={tweaks.showBiometrics} onChange={v => setTweak('showBiometrics', v)} />
        </TweakSection>
        <TweakSection title="Calendar">
          <TweakSelect label="Week starts on" value={tweaks.weekStart} options={['Mon','Tue','Wed','Thu','Fri','Sat','Sun']} onChange={v => setTweak('weekStart', v)} />
        </TweakSection>
      </TweaksPanel>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
